backend:
  name: github
  repo: YOUR_GITHUB_USERNAME/YOUR_REPO_NAME   # ✏️ e.g. angelaguo/portfolio
  branch: main

# Where uploaded images go
media_folder: uploads
public_folder: /uploads

# ============================================================
# CONTENT TYPES
# ============================================================
collections:

  # ── PORTFOLIO ─────────────────────────────────────────────
  - name: portfolio
    label: Portfolio
    label_singular: Project
    folder: content/portfolio
    create: true
    slug: "{{slug}}"           # filename = slugified product name
    identifier_field: name
    summary: "{{name}} · {{company}} · {{year}}"
    fields:
      - { label: "Product name", name: name, widget: string, hint: "e.g. Shop The Look" }
      - { label: "Company", name: company, widget: select, options: ["Amazon", "Pinterest", "VIP.com", "Side project"] }
      - { label: "Year", name: year, widget: string, hint: "e.g. 2019 or 2019–2021" }
      - { label: "Impact", name: impact, widget: string, hint: "One-liner — e.g. Top 3 product by user engagement" }
      - { label: "Description", name: description, widget: text, hint: "2–3 sentences. Problem, your role, outcome." }
      - { label: "Featured on homepage", name: featured, widget: boolean, default: false, hint: "Show on homepage (max 3 shown)" }
      - { label: "Image", name: image, widget: image, required: false, hint: "Optional screenshot or demo" }

  # ── BLOG ──────────────────────────────────────────────────
  - name: blog
    label: Blog
    label_singular: Post
    folder: content/blog
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} · {{date}}"
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Date", name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Tag", name: tag, widget: select, options: ["product", "build-in-public", "self"] }
      - { label: "Featured on homepage", name: featured, widget: boolean, default: false, hint: "Show on homepage (max 3 shown)" }
      - { label: "Body", name: body, widget: markdown }
