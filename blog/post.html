</style>
</head>
<body>

<!-- CHATBOT -->
<button id="chat-toggle" title="Ask Angela">💬</button>

  <div class="chat-header">

<script src="/_chat.js"></script>
<script>
// ── Parse frontmatter ──────────────────────────────────────
function parseFrontmatter(raw) {
  const match = raw.match(/^---\n([\s\S]*?)\n---/);
  if (!match) return { data: {}, body: raw };
  const body = raw.slice(match[0].length).trim();
  const data = {};
  match[1].split('\n').forEach(line => {
    const colon = line.indexOf(':');
    if (colon === -1) return;
    const key = line.slice(0, colon).trim();
    let val = line.slice(colon + 1).trim();
    if ((val.startsWith('"') && val.endsWith('"')) ||
        (val.startsWith("'") && val.endsWith("'"))) val = val.slice(1, -1);
    if (val === 'true') val = true;
    else if (val === 'false') val = false;
    data[key] = val;
  });
  return { data, body };
}

// ── Markdown renderer ─────────────────────────────────────
function renderMarkdown(md) {
  if (!md) return '';
  return md
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/\[(.+?)\]\((.+?)\)/g, '<a href="$2">$1</a>')
    .split(/\n\n+/)
    .map(p => p.trim())
    .filter(p => p.length > 0)
    .map(p => `<p>${p.replace(/\n/g, ' ')}</p>`)
    .join('');
}

// ── Load and render post ──────────────────────────────────
async function loadPost() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');
  const container = document.getElementById('post-content');

  if (!slug) {
    container.innerHTML = '<p class="post-error">No post specified. <a href="/blog.html">Back to blog →</a></p>';
    return;
  }

  try {
    const res = await fetch(`/content/blog/${slug}`);
    if (!res.ok) throw new Error('Post not found');
    const raw = await res.text();
    const { data, body } = parseFrontmatter(raw);

    // Update page title
    if (data.title) document.title = `${data.title} — Angela Guo`;

    // Format date
    let dateStr = '';
    if (data.date) {
      const d = new Date(data.date);
      dateStr = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
    }

    container.innerHTML = `
      <div class="post-eyebrow">${data.tag ? '#' + data.tag : ''} ${dateStr ? '· ' + dateStr : ''}</div>
      <h1 class="post-title">${data.title || 'Untitled'}</h1>
      <div class="post-body">${renderMarkdown(body)}</div>
    `;
  } catch (err) {
    container.innerHTML = '<p class="post-error">Post not found. <a href="/blog.html">Back to blog →</a></p>';
  }
}

loadPost();
</script>
</body>
</html>
